baseURL = 'https://www.electricitynoproblem.com/'
languageCode = 'en-in'
title = 'Atlas Electro Vision'
theme = 'tella'

DefaultContentLanguage = "en"
enableInlineShortcodes = true
enableRobotsTXT = true

# Please enable this feature if the site is available in Japanese, Chinese or Korean.
#hasCJKLanguage = true

# If you're using Google Analytics, you can enable this feature.
#googleAnalytics = "UA-12345678-1"

# Disqus Comment System
#disqusShortname = ""

[params]

  showBlog = false
  mainSections = ['about']

  googleFonts = true

  [params.logo]
    main = "img/logo/logo.svg"
    alt = "Atlas Electro Vision Logo"

    # The size parameter is the class name of tailwindcss
    # https://tailwindcss.com/
    size = "h-14"

  [params.site]
    title = "Atlas Electro Vision"
    name = "Atlas Electro Vision"

  [params.icon]
    #If you want to use FontAwesome, set this parameter to true.
    fontawesome = true

  [params.homepage_meta_tags]
    meta_description = "Atlas Electro Vision Pvt. Ltd. - Providing reliable electrical maintenance and testing services since 1994."
    meta_og_title = "Atlas Electro Vision Pvt. Ltd."
    meta_og_type = "website"

[menu]


  [[menu.main]]
    identifier = "about"
    name = "About"
    url = "/about/"
    weight = 2

  [[menu.main]]
    identifier = "services"
    name = "Services"
    url = "/services/"
    weight = 3

  [[menu.main]]
    identifier = "contact"
    name = "Contact"
    url = "/contact/"
    weight = 4

  # Footer Menu
  [[menu.footer]]
    name = "Home"
    url = "/"
    weight = 1
